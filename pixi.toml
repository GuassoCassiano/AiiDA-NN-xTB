[workspace]
name = "aiida-nn-xtb"
version = "0.1.0"
description = "AiiDA Plugin for easier use of NN-xTB energy calculations"
channels = ["conda-forge"]
platforms = ["linux-64"]

[dependencies]
# Core Language
python = ">=3.11,<3.13"

# WorkFlow Engine
aiida-core = ">=2.8.0,<3"

# Chemistry
rdkit = ">=2024"

# Testing Framework
pytest = ">=8"

# Build and package Utilities
pip = "*"
setuptools = "<80"

[pypi-dependencies]
aiida-nn-xtb = { path = ".", editable = true }

[tasks]
test = "pytest tests/ -v"
